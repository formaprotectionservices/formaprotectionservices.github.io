# English (default)
# -----------------
en: &DEFAULT_EN
  header:
    title: "Forma Protection Services"
    text: " Crafted, Committed, Secured."
    button: "Request a Quote"
    buttonlink: "#contact"

  services:
    title: "Security Services"
    text: "Comprehensive protection solutions across all of British Columbia."
    section: services
    list:
      - title: "Uniformed Security Guards"
        desc: "Licensed officers providing site protection, access control, patrols, and fast incident response."
        icon: fas fa-shield-alt
      - title: "Armed Guards w/ BodyCams"
        desc: "Highly trained, licensed armed guards equipped with body-worn cameras for transparent, accountable incident response across British Columbia."
        icon: fas fa-crosshairs
      - title: "CCTV & Alarm Monitoring"
        desc: "Integrated video surveillance and alarm systems with professional monitoring and evidence recording."
        icon: fas fa-video
      - title: "Drone Support"
        desc: "Aerial security and site reconnaissance for hard-to-reach properties and large event spaces."
        icon: fas fa-helicopter
      - title: "GPS Patrol Tracking"
        desc: "Real-time GPS monitoring keeps patrols on schedule and improves coverage for every site."
        icon: fas fa-map-marker-alt
      - title: "Mobile Patrol Services"
        desc: "Responsive vehicle patrols and mobile officers deliver visible protection across your property."
        icon: fas fa-car
      - title: "Digital Incident Reports"
        desc: "Secure digital reporting ensures fast incident capture, documentation, and follow-up."
        icon: fas fa-file-alt
      - title: "24/7 Support & Competitive Pricing"
        desc: "Affordable security solutions backed by fast response and round-the-clock customer service."
        icon: fas fa-headset
      - title: "NFC Tagging & Asset Tracking"
        desc: "Smart NFC placement and tagging for asset verification, inspection logging, and site integrity."
        icon: fas fa-tags

  portfolio:
    title: "Taylored Security Programs"
    text: "Comprehensive security programs and services tailored for communities and businesses across British Columbia."
    section: portfolio
    closebutton: "Close Program"

  timeline:
    title: "Our Story"
    text: "A history of trusted security service and BC-wide growth."
    section: timeline
    events:
      - title: "Founded in Vancouver"
        year: "2014"
        desc: "Started as a local security provider focused on residential and small-business protection."
        image: assets/img/timeline/1.jpg
        alt: "Security patrol"
      - title: "Expanded Province-Wide"
        year: "2018"
        desc: "Built a BC network of officers, monitoring staff, and rapid-response teams."
        image: assets/img/timeline/2.jpg
        alt: "BC operations"
      - title: "Smart Security Solutions"
        year: "2021"
        desc: "Added CCTV, access control, and mobile patrol services for modern commercial properties."
        image: assets/img/timeline/3.jpg
        alt: "Security technology"
      - title: "BC Trusted Partner"
        year: "2024"
        desc: "Delivering reliable protection, fast response, and professional service throughout British Columbia."
        image: assets/img/timeline/4.jpg
        alt: "Trusted security"
    end: "Protecting BC<br>Every Day"

  about:
    title: "About Us"
    text: "Vancouver-based security experts"
    body: "Forma Protection Services is a Vancouver-based security company serving the entire province of British Columbia. We deliver private security guard services, CCTV and alarm monitoring, drone support, NFC tagging, and access control solutions for commercial, residential, and special event clients. Our teams are trained to protect people, property, and operations with responsive, practical security programs."
    section: about

  clients:
    section: clients
    max-height: 100px
    horizontal-scrolling: "yes"
    list:
      - title: "Commercial Security"
        url: "#services"
        logo: assets/img/clients/envato.jpg
      - title: "Residential Safety"
        url: "#services"
        logo: assets/img/clients/designmodo.jpg
      - title: "Industrial Sites"
        url: "#services"
        logo: assets/img/clients/themeforest.jpg
      - title: "Event Protection"
        url: "#services"
        logo: assets/img/clients/creative-market.jpg

  team:
    title: "Our Leadership"
    text: "Experienced security professionals with BC-wide operations."
    subtext: "Licensed, insured, and trained to support your security goals across Vancouver and British Columbia."
    section: team
    people:
      - name: "Shaan Arora"
        role: "Founder & CEO"
        image: assets/img/team/500x500.jpg
        social:
          - url: https://www.linkedin.com
            icon: fab fa-linkedin-in
      - name: "Megan Lee"
        role: "Director of Operations"
        image: assets/img/team/2.jpg
        social:
          - url: https://www.linkedin.com
            icon: fab fa-linkedin-in
      - name: "Alex Chen"
        role: "Security Technology Lead"
        image: assets/img/team/500x500.jpg
        social:
          - url: https://www.linkedin.com
            icon: fab fa-linkedin-in

  contact:
    title: "Contact Us"
    text: 'Call <a href="tel:+16722004424">+1 672-200-4424</a> or email <a href="mailto:info@formaprotectionservices.ca">info@formaprotectionservices.ca</a> to request a consultation.'
    section: contact
    name: "Name*"
    name-validation: "Please enter your name."
    email: "Email*"
    email-validation: "Please enter your email address."
    phone: "Phone Number"
    phone-validation: "Please enter your phone number."
    message: "Message*"
    message-validation: "Please enter a message."
    subject: "Security Inquiry"
    submit: "Send Message"

  footer:
    legal: "Privacy Policy"
    social:
      - url: https://www.linkedin.com
        icon: "fab fa-linkedin-in"
      - url: https://twitter.com
        icon: "fab fa-twitter"
      - url: https://facebook.com
        icon: "fab fa-facebook-f"

en-US:
  <<: *DEFAULT_EN
en-CA:
  <<: *DEFAULT_EN
en-GB:
  <<: *DEFAULT_EN
en-AU:
  <<: *DEFAULT_EN

